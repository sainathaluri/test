name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  backend-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Spring Boot
        run: |
          cd backend
          mvn clean package